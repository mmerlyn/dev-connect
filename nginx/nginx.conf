worker_processes auto;
worker_rlimit_nofile 65535;

events {
    # Each proxied WebSocket holds one client-side and one upstream-side
    # file descriptor, so worker_connections is an effective /2 on
    # concurrent connections per worker — sized generously here since the
    # real ceiling on a shared dev machine is Docker's CPU/memory budget,
    # not this number.
    worker_connections 16384;
}

http {
    # Socket.IO is WebSocket-only in this stack (see SOCKET_CONFIG.transports),
    # so there's no multi-request long-polling handshake that needs to land
    # on the same backend — least_conn load-balances every connection freely
    # instead of pinning clients to one gateway with ip_hash.
    upstream gateways {
        least_conn;
        server gateway1:8080 max_fails=2 fail_timeout=10s;
        server gateway2:8080 max_fails=2 fail_timeout=10s;
        server gateway3:8080 max_fails=2 fail_timeout=10s;
    }

    # Standard WebSocket-upgrade map: only send "Connection: upgrade" when
    # the client actually asked to upgrade, so plain REST requests through
    # the same upstream aren't marked as upgrade attempts.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://gateways;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket connections are long-lived; Nginx's 60s default idle
            # timeout would silently kill them well before Socket.IO's own
            # ping/pong (SOCKET_CONFIG.pingTimeout) ever gets a chance to.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
